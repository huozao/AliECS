<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AliECS 业务入口</title><style>body{font-family:Inter,system-ui;background:#f6f4ee;margin:0;color:#171715}.c{width:min(1080px,92vw);margin:0 auto;padding:18px}.card{background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:12px;margin-bottom:12px}.row{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;text-decoration:none;color:inherit;cursor:pointer}.btn.p{background:#c86a45;color:#fff;border-color:#c86a45}.muted{color:#666}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.f{border:1px solid #eee;border-radius:10px;padding:10px;background:#fff}.tag{font-size:.78rem;padding:2px 8px;border-radius:999px;border:1px solid #ddd;display:inline-block}.reserved{background:#f7f0df}.active{background:#eaf6ef}.top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}input{padding:8px;border:1px solid #ddd;border-radius:8px}@media(max-width:860px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:620px){.grid{grid-template-columns:1fr}}</style></head><body><div class="c"><div class="top"><h1 style="font-family:Georgia,serif">AliECS · 普通业务入口</h1><div class="row"><a class="btn" href="/admin/">Admin UI（仅管理员）</a><a class="btn" href="/api/healthz">Health</a></div></div>
<div class="card"><h2 style="font-family:Georgia,serif">项目简介</h2><p class="muted">public-web 面向普通使用者；admin-ui 面向系统管理员；backend-api 是唯一权限判断中心；postgres 保存用户、角色、权限和功能入口。</p></div>
<div class="card"><h2 style="font-family:Georgia,serif">登录</h2><div class="row"><input id="u" placeholder="用户名"><input id="p" type="password" placeholder="密码"><button class="btn p" id="login">登录</button><button class="btn" id="logout">退出</button></div><p id="me" class="muted">当前身份：guest（未登录）</p></div>
<div class="card"><h2 style="font-family:Georgia,serif">功能入口</h2><div id="features" class="grid"></div></div>
</div><script>
const api='/api';let token=localStorage.getItem('user_token')||'';
const h=()=>token?{'Authorization':'Bearer '+token,'Content-Type':'application/json'}:{'Content-Type':'application/json'};
async function req(path,opt={}){const r=await fetch(api+path,{...opt,headers:{...h(),...(opt.headers||{})}});const j=await r.json();if(!r.ok)throw new Error(j.detail||'请求失败');return j;}
function render(data){me.textContent=`当前身份：${data.user.username||'guest'} | 角色: ${(data.user.roles||[]).join(',')||'guest'}`;features.innerHTML='';for(const f of data.features){const div=document.createElement('div');const st=f.status==='reserved'?'reserved':'active';const url=f.url||'#';div.className='f';div.innerHTML=`<h3>${f.title}</h3><div class='tag ${st}'>${f.status}</div><p class='muted'>${f.description||''}</p><p class='muted'>${f.required_permission?`需权限: ${f.required_permission}`:'公开功能'}</p>${f.url?`<a class='btn' target='_blank' href='${url}'>打开入口</a>`:`<button class='btn' disabled>预留</button>`}`;features.appendChild(div);} }
async function load(){const d=await req('/v1/features');render(d);} 
login.onclick=async()=>{try{const d=await req('/v1/auth/login',{method:'POST',body:JSON.stringify({username:u.value.trim(),password:p.value})});token=d.token;localStorage.setItem('user_token',token);await load();}catch(e){alert(e.message)}};
logout.onclick=async()=>{token='';localStorage.removeItem('user_token');try{await req('/v1/auth/logout',{method:'POST'});}catch{} await load();};
load().catch(()=>{me.textContent='当前身份：guest（接口不可用）'});
</script></body></html>
