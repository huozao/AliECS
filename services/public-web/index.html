<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AliECS · 首页</title>
  <style>
    :root { --bg:#f7f5f0; --card:#fffdf8; --text:#25211b; --muted:#766f63; --line:#e7dfd0; --primary:#6f5e46; --shadow:0 12px 30px rgba(69,56,38,.08); }
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,rgba(180,157,118,.18),transparent 35%),var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui}
    .wrap{max-width:1120px;margin:0 auto;padding:20px 18px 56px}
    .topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;background:rgba(255,253,248,.92);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:18px 20px;margin-bottom:16px}
    h1{margin:0;font-size:34px}.subtitle{margin:8px 0 0;color:var(--muted);line-height:1.7}
    .top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn,button{border:0;border-radius:999px;padding:9px 13px;background:#e8dfcf;color:var(--text);cursor:pointer;font-weight:650;text-decoration:none}
    .btn.primary{background:var(--primary);color:#fff}.btn.subtle{background:#efe8dc;color:#6e6355}
    .btn.heart{padding:8px 10px;background:transparent;color:rgba(149,104,120,.66);font-size:14px;cursor:default}
    .card{background:rgba(255,253,248,.92);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .feature-card{min-height:190px;display:flex;flex-direction:column;justify-content:space-between}
    .hidden{display:none!important}.small{font-size:12px}.muted{color:var(--muted)}
    .notice,.error,.success{border-radius:14px;padding:12px 14px;margin-bottom:14px}
    .notice{background:#f2eadc;color:var(--muted)} .error{display:none;background:#f5d7d3;color:#a6423a} .success{display:none;background:#dfeee3;color:#3f7a4c}
    input{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;background:#fff} label{display:block;color:var(--muted);font-size:13px;margin:8px 0 6px}
    @media (max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1>首页</h1>
        <p class="subtitle">配方业务入口、系统状态与权限功能的统一导航页。</p>
      </div>
      <nav class="top-actions">
        <a class="btn primary" href="/">首页</a>
        <a class="btn" href="/admin/">Admin UI（仅管理员）</a>
        <a class="btn" href="/api/healthz" target="_blank" rel="noreferrer">API Health</a>
        <a class="btn" href="https://github.com/huozao/AliECS" target="_blank" rel="noreferrer">GitHub</a>
        <button id="topHeart" class="btn heart" type="button" aria-label="decorative-heart">💗</button>
        <button id="refreshBtn" class="btn subtle" type="button">刷新数据</button>
        <button id="topLoginBtn" class="btn" type="button">登录</button>
        <button id="topRegisterBtn" class="btn hidden" type="button">注册</button>
        <button id="topLogoutBtn" class="btn hidden" type="button">退出登录</button>
      </nav>
    </header>
    <div id="errorBox" class="error"></div><div id="successBox" class="success"></div>
    <section class="card"><h2>登录与权限</h2><div id="identityBox" class="notice">当前身份：guest（未登录）。</div>
      <div id="loginArea"><div class="grid" style="grid-template-columns: repeat(2,minmax(0,1fr));"><div><label for="usernameInput">用户名</label><input id="usernameInput" autocomplete="username" /></div><div><label for="passwordInput">密码</label><input id="passwordInput" type="password" autocomplete="current-password" /></div></div><div style="margin-top:14px;"><button id="loginBtn" class="btn primary" type="button">登录</button></div></div>
      <div id="logoutArea" class="hidden"><button id="logoutBtn" class="btn" type="button">退出登录</button></div>
    </section>
    <section id="features" class="card"><h2>主要功能</h2><p class="muted">功能入口由后端 `/v1/features` 按权限返回。</p><div id="featuresGrid" class="grid"></div></section>
  </div>
<script>
const API_BASE = location.port === '8080' ? 'http://localhost:8000' : '/api';
const state = { token: localStorage.getItem('portal_token') || '', user:null, features:[] };
const $=(id)=>document.getElementById(id);
const getAuthToken=()=>localStorage.getItem('portal_token')||'';
function showError(m){$('errorBox').textContent=m;$('errorBox').style.display='block';$('successBox').style.display='none'}
function showSuccess(m){$('successBox').textContent=m;$('successBox').style.display='block';$('errorBox').style.display='none'}
function clearMessage(){$('errorBox').style.display='none';$('successBox').style.display='none'}
async function api(path,opt={}){const h=Object.assign({'Content-Type':'application/json'},opt.headers||{});const tk=getAuthToken();if(tk) h.Authorization=`Bearer ${tk}`;const r=await fetch(`${API_BASE}${path}`,{...opt,headers:h});const t=await r.text();let d={};if(t){try{d=JSON.parse(t)}catch{d={raw:t}}}if(!r.ok){if(r.status===401){localStorage.removeItem('portal_token');state.token='';}throw new Error(d.detail||`HTTP ${r.status}`)}return d}
async function requestCoupleAccess(){try{const d=await api('/couple/access');if(d&&d.allowed===true){return d.route||'/couple/';}}catch{} return null;}
async function enterCoupleSilently(){const route=await requestCoupleAccess();if(route) window.location.assign(route)}
function renderAuth(){const logged=Boolean(state.token&&state.user&&state.user.username!=='guest');$('loginArea').classList.toggle('hidden',logged);$('logoutArea').classList.toggle('hidden',!logged);$('topLoginBtn').classList.toggle('hidden',logged);$('topRegisterBtn').classList.toggle('hidden',logged);$('topLogoutBtn').classList.toggle('hidden',!logged);$('topHeart').style.cursor=logged?'pointer':'default';const u=state.user||{username:'guest',roles:[],permissions:[]};$('identityBox').innerHTML=`当前身份：<strong>${u.username||u.sub||'guest'}</strong><div class="small muted" style="margin-top:6px;">角色：${(u.roles||[]).join(', ')||'无'}　权限：${(u.permissions||[]).join(', ')||'无'}</div>`;}
function renderFeatures(){const it=state.features||[];if(!it.length){$('featuresGrid').innerHTML='<div class="notice">当前没有可访问的功能入口。</div>';return;}$('featuresGrid').innerHTML=it.map(f=>`<article class="feature-card card"><div><h3>${f.title}</h3><p>${f.description||'暂无说明'}</p><div class="small muted">分类：${f.category||'未分类'}<br/>权限：${f.required_permission||'公开'}</div></div><div style="margin-top:14px;">${f.url&&f.status==='active'?`<a class="btn primary" href="${f.url}" target="_blank" rel="noreferrer">打开入口</a>`:'<span class="btn subtle">暂不可用</span>'}</div></article>`).join('')}
async function loadFeatures(){clearMessage();const d=await api('/v1/features');state.user=d.user||{username:'guest',roles:[],permissions:[]};state.features=d.features||[];state.token=getAuthToken();renderAuth();renderFeatures();}
async function login(){clearMessage();const username=$('usernameInput').value.trim();const password=$('passwordInput').value;if(!username||!password){showError('请输入用户名和密码。');return;}const d=await api('/v1/auth/login',{method:'POST',body:JSON.stringify({username,password})});state.token=d.token;localStorage.setItem('portal_token',state.token);showSuccess('登录成功。');await loadFeatures();}
function logout(){localStorage.removeItem('portal_token');state.token='';state.user=null;showSuccess('已退出登录。');loadFeatures().catch((e)=>showError(e.message));}
document.addEventListener('DOMContentLoaded',()=>{$('topHeart').addEventListener('click',()=>{enterCoupleSilently();});$('refreshBtn').addEventListener('click',()=>loadFeatures().catch((e)=>showError(`加载失败：${e.message}`)));$('topLoginBtn').addEventListener('click',()=>{$('usernameInput').focus();});$('topRegisterBtn').addEventListener('click',()=>{$('usernameInput').focus();});$('topLogoutBtn').addEventListener('click',logout);$('loginBtn').addEventListener('click',()=>login().catch((e)=>showError(e.message)));$('logoutBtn').addEventListener('click',logout);$('passwordInput').addEventListener('keydown',(e)=>{if(e.key==='Enter') login().catch((err)=>showError(err.message));});loadFeatures().catch((e)=>showError(`加载功能入口失败：${e.message}`));});
</script>
</body></html>
