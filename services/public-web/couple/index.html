<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>AliECS</title><style>:root{--bg:#f7f5f0;--line:#e7dfd0;--text:#25211b;--muted:#766f63;--card:#fffdf8;--shadow:0 12px 30px rgba(69,56,38,.08)}*{box-sizing:border-box}body{margin:0;background:linear-gradient(150deg,#f9f4ea 0%,#f8f1f5 50%,#fffdfa 100%);color:var(--text);font-family:ui-sans-serif,system-ui}.wrap{max-width:1120px;margin:0 auto;padding:20px 18px 56px}.topbar{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap;background:rgba(255,253,248,.92);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:20px;padding:18px 20px;margin-bottom:16px}.top-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:999px;padding:9px 13px;background:#e8dfcf;color:var(--text);cursor:pointer;font-weight:650;text-decoration:none}.heart{background:transparent;color:rgba(149,104,120,.66)}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}</style></head><body><div class="wrap"><header class="topbar"><div><h1 style="margin:0;font-size:34px">首页</h1><p style="margin:8px 0 0;color:var(--muted)">配方业务入口、系统状态与权限功能的统一导航页。</p></div><nav class="top-actions"><a class="btn" href="/">首页</a><a class="btn" href="/admin/">Admin UI（仅管理员）</a><a class="btn" href="/api/healthz" target="_blank">API Health</a><a class="btn" href="https://github.com/huozao/AliECS" target="_blank">GitHub</a><button id="topHeart" class="btn heart" type="button">💗</button></nav></header><div id="app"></div></div><script>const API_BASE=location.port==='8080'?'http://localhost:8000':'/api';const getAuthToken=()=>localStorage.getItem('portal_token')||'';async function requestCoupleAccess(){try{const h={'Content-Type':'application/json'};const tk=getAuthToken();if(tk)h.Authorization=`Bearer ${tk}`;const r=await fetch(`${API_BASE}/couple/access`,{headers:h});if(!r.ok)return null;const d=await r.json();if(d&&d.allowed===true)return d.route||'/couple/';}catch{}return null;}function render(){document.getElementById('app').innerHTML=`<section class="card"><h2 style="margin:0 0 8px;font-size:34px">两个人的记忆地图</h2><p style="margin:0;color:#7b6755">把照片、文字、地点和时间，整理成只属于我们的故事。</p><p style="color:#8d7a66;line-height:1.8">在每一个普通日子里，认真保存彼此走过的路、说过的话和共同期待的未来。</p></section><section style="display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px" class="card"><article><div style="font-size:13px;color:#846f5d">恋爱天数</div><div style="font-size:26px;font-weight:700">已一起走过 520 天</div></article><article><div style="font-size:13px;color:#846f5d">下一个纪念日</div><div style="font-size:26px;font-weight:700">还有 18 天</div></article></section><section class="card"><h3>最近回忆</h3><ul><li>初秋散步 · 2025-09-12 · 杭州西湖</li><li>第一次做饭挑战 · 2025-10-03 · 家里厨房</li><li>短途看海 · 2025-11-22 · 宁波象山</li></ul></section><section style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px"><div class="card">查看我们去过的地方</div><div class="card">按时间回看我们的故事</div><div class="card">整理照片和视频回忆</div><div class="card">记录每一个重要日子</div><div class="card">写下想一起完成的事情</div></section>`;}document.addEventListener('DOMContentLoaded',async()=>{const route=await requestCoupleAccess();if(!route){location.replace('/');return;}render();document.getElementById('topHeart').addEventListener('click',()=>{location.assign(route);});});</script></body></html>
