<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AliECS Admin UI</title><style>body{font-family:Inter,system-ui;background:#f6f4ee;margin:0;color:#171715}.c{width:min(1180px,95vw);margin:0 auto;padding:18px}.card{background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:12px;margin-bottom:12px}h1,h2{font-family:Georgia,serif}.row{display:flex;gap:8px;flex-wrap:wrap}.row input,.row select,.row textarea{padding:8px;border:1px solid #ddd;border-radius:8px}.btn{padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer}.btn.p{background:#c86a45;color:#fff;border-color:#c86a45}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:6px;text-align:left;font-size:.9rem}.muted{color:#666}</style></head><body><div class="c"><h1>系统管理后台</h1>
<div class="card"><h2>登录区</h2><div class="row"><input id="u" placeholder="用户名"><input id="p" type="password" placeholder="密码"><button class="btn p" id="login">登录</button><button class="btn" id="logout">退出登录</button></div><div id="me" class="muted">未登录</div></div>
<div class="card"><h2>仪表盘</h2><div id="stats" class="row muted">请先登录加载数据</div></div>
<div class="card"><h2>用户管理</h2><div class="row"><input id="nu" placeholder="新用户用户名"><input id="nd" placeholder="显示名"><input id="np" placeholder="密码"><button class="btn p" id="createUser">新增用户</button></div><table id="usersTbl"><thead><tr><th>ID</th><th>用户名</th><th>显示名</th><th>状态</th><th>角色</th><th>操作</th></tr></thead><tbody></tbody></table></div>
<div class="card"><h2>角色与权限</h2><div class="row"><button class="btn" id="loadRoles">刷新角色</button><button class="btn" id="loadPerms">刷新权限</button></div><div id="roles" class="muted"></div><div id="perms" class="muted"></div></div>
<div class="card"><h2>功能入口管理</h2><div class="row"><input id="fc" placeholder="code"><input id="ft" placeholder="title"><input id="fu" placeholder="url"><input id="fp" placeholder="required_permission"><select id="fs"><option value="active">active</option><option value="reserved">reserved</option></select><button class="btn p" id="createFeature">新增功能</button></div><table id="featuresTbl"><thead><tr><th>ID</th><th>Code</th><th>Title</th><th>Status</th><th>Permission</th></tr></thead><tbody></tbody></table></div>
<div class="card"><h2>审计日志</h2><button class="btn" id="loadLogs">刷新日志</button><table id="logsTbl"><thead><tr><th>ID</th><th>操作者</th><th>动作</th><th>对象</th><th>时间</th></tr></thead><tbody></tbody></table></div>
</div>
<script>
const api='/api';let token=localStorage.getItem('admin_token')||'';let roles=[],perms=[];
const hdr=()=>token?{'Authorization':'Bearer '+token,'Content-Type':'application/json'}:{'Content-Type':'application/json'};
function setMe(t){document.getElementById('me').textContent=t}
async function req(path,opt={}){const r=await fetch(api+path,{...opt,headers:{...hdr(),...(opt.headers||{})}});if(r.status===401){setMe('登录过期，请重新登录');throw new Error('401')}if(r.status===403){alert('权限不足');throw new Error('403')}const j=await r.json();if(!r.ok)throw new Error(j.detail||'请求失败');return j;}
async function login(){const username=u.value.trim(),password=p.value;const d=await req('/v1/auth/login',{method:'POST',body:JSON.stringify({username,password})});token=d.token;localStorage.setItem('admin_token',token);setMe(`已登录：${d.user.display_name}(${d.user.username}) 角色:${d.user.roles.join(',')} 权限:${d.user.permissions.join(',')}`);await loadAll();}
function logout(){token='';localStorage.removeItem('admin_token');setMe('已退出');}
async function loadUsers(){const d=await req('/v1/admin/users');const rs=await req('/v1/admin/roles');roles=rs.items;const tb=usersTbl.querySelector('tbody');tb.innerHTML='';for(const u of d.items){const tr=document.createElement('tr');tr.innerHTML=`<td>${u.id}</td><td>${u.username}</td><td>${u.display_name}</td><td>${u.status}</td><td><select id='r_${u.id}' multiple>${roles.map(r=>`<option value='${r.id}'>${r.code}</option>`).join('')}</select></td><td><button class='btn' onclick='toggleUser(${u.id},"${u.status}")'>${u.status==='active'?'禁用':'启用'}</button><button class='btn' onclick='resetPw(${u.id})'>重置密码</button><button class='btn' onclick='saveRoles(${u.id})'>保存角色</button></td>`;tb.appendChild(tr);}document.getElementById('stats').textContent=`用户数: ${d.items.length}`;}
async function createUser(){await req('/v1/admin/users',{method:'POST',body:JSON.stringify({username:nu.value,display_name:nd.value,password:np.value})});await loadUsers();}
async function toggleUser(id,s){await req(`/v1/admin/users/${id}/${s==='active'?'disable':'enable'}`,{method:'POST'});await loadUsers();}
async function resetPw(id){const p=prompt('新密码');if(!p)return;await req(`/v1/admin/users/${id}/reset-password`,{method:'POST',body:JSON.stringify({new_password:p})});alert('已重置');}
async function saveRoles(id){const sel=document.getElementById('r_'+id);const role_ids=[...sel.selectedOptions].map(x=>Number(x.value));await req(`/v1/admin/users/${id}/roles`,{method:'PUT',body:JSON.stringify({role_ids})});alert('角色已保存');}
async function loadRoles(){const d=await req('/v1/admin/roles');roles=d.items;document.getElementById('roles').textContent='角色: '+d.items.map(x=>`${x.id}:${x.code}`).join(' | ')}
async function loadPerms(){const d=await req('/v1/admin/permissions');perms=d.items;document.getElementById('perms').textContent='权限: '+d.items.map(x=>x.code).join(' | ')}
async function loadFeatures(){const d=await req('/v1/admin/features');const tb=featuresTbl.querySelector('tbody');tb.innerHTML='';for(const f of d.items){const tr=document.createElement('tr');tr.innerHTML=`<td>${f.id}</td><td>${f.code}</td><td>${f.title}</td><td>${f.status}</td><td>${f.required_permission||''}</td>`;tb.appendChild(tr);}document.getElementById('stats').textContent += ` | 功能数: ${d.items.length}`;}
async function createFeature(){await req('/v1/admin/features',{method:'POST',body:JSON.stringify({code:fc.value,title:ft.value,url:fu.value||null,required_permission:fp.value||null,status:fs.value})});await loadFeatures();}
async function loadLogs(){const d=await req('/v1/admin/audit-logs');const tb=logsTbl.querySelector('tbody');tb.innerHTML='';for(const l of d.items){const tr=document.createElement('tr');tr.innerHTML=`<td>${l.id}</td><td>${l.actor_username||''}</td><td>${l.action}</td><td>${l.target_type||''}:${l.target_id||''}</td><td>${l.created_at}</td>`;tb.appendChild(tr);}document.getElementById('stats').textContent += ` | 日志: ${d.items.length}`;}
async function loadAll(){await Promise.all([loadUsers(),loadRoles(),loadPerms(),loadFeatures(),loadLogs()]);}
login.onclick=()=>login().catch(e=>alert(e.message));logout.onclick=logout;createUser.onclick=()=>createUser().catch(e=>alert(e.message));createFeature.onclick=()=>createFeature().catch(e=>alert(e.message));loadRoles.onclick=()=>loadRoles().catch(e=>alert(e.message));loadPerms.onclick=()=>loadPerms().catch(e=>alert(e.message));loadLogs.onclick=()=>loadLogs().catch(e=>alert(e.message));
if(token){req('/v1/auth/me').then(me=>{setMe(`已登录：${me.display_name||me.sub}`);loadAll();}).catch(()=>{});} 
</script></body></html>
