services:
  public-web:
    image: ${PUBLIC_WEB_IMAGE}
    restart: always

  admin-ui:
    image: ${ADMIN_UI_IMAGE}
    restart: always

  backend-api:
    image: ${BACKEND_API_IMAGE}
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
