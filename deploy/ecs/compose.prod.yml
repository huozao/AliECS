services:
  public-web:
    image: ${PUBLIC_WEB_IMAGE}
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend-api:
        condition: service_healthy

  admin-ui:
    image: ${ADMIN_UI_IMAGE}
    restart: always
    ports:
      - "127.0.0.1:8081:80"

  backend-api:
    image: ${BACKEND_API_IMAGE}
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
