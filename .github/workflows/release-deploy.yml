name: 发布并部署

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "要部署的镜像标签（必须以 v 开头，例如 v0.1.0）"
        required: true
        type: string

concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 设置镜像标签
        id: vars
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "镜像标签格式错误：$TAG（必须以 v 开头，例如 v0.1.0）" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 登录 GHCR（用于推送）
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 构建并推送 public-web
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/public-web:${{ steps.vars.outputs.tag }} services/public-web
          docker push ghcr.io/${{ github.repository_owner }}/public-web:${{ steps.vars.outputs.tag }}

      - name: 构建并推送 admin-ui
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/admin-ui:${{ steps.vars.outputs.tag }} services/admin-ui
          docker push ghcr.io/${{ github.repository_owner }}/admin-ui:${{ steps.vars.outputs.tag }}

      - name: 构建并推送 backend-api
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/backend-api:${{ steps.vars.outputs.tag }} services/backend-api
          docker push ghcr.io/${{ github.repository_owner }}/backend-api:${{ steps.vars.outputs.tag }}

      - name: 通过 SSH 触发 ECS 部署脚本
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            export GHCR_USERNAME="${GHCR_USERNAME:-}"
            export GHCR_TOKEN="${GHCR_TOKEN:-}"
            /opt/app/deploy/ecs/deploy.sh ${{ steps.vars.outputs.tag }}
