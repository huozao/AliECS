services:
  public-web:
    build: ../services/public-web
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend-api:
        condition: service_healthy

  admin-ui:
    build: ../services/admin-ui
    ports:
      - "127.0.0.1:8081:80"

  backend-api:
    build: ../services/backend-api
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
